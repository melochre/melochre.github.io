<title>Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080808;
    --surface: #111;
    --surface2: #181818;
    --border: #222;
    --accent: #c8ff47;
    --accent-dim: rgba(200,255,71,0.10);
    --text: #e8e8e8;
    --text-dim: #555;
    --text-mid: #888;
    --red: #ff4f4f;
    --blue: #47b8ff;
    --orange: #ffaa47;
    --green: #47ff91;
    --purple: #a78bfa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
    max-width: 480px;
    margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 18px 18px 12px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg); z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
  .header-left .date { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .progress-ring { position: relative; width: 52px; height: 52px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .pr-track { fill: none; stroke: var(--border); stroke-width: 3; }
  .pr-fill { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .pr-count { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); line-height: 1.1; }
  .pr-count small { font-size: 8px; color: var(--text-dim); }

  /* SECTION */
  .section { border-bottom: 1px solid var(--border); }
  .section-header { padding: 12px 18px 6px; display: flex; align-items: center; gap: 8px; }
  .section-label { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
  .label-am    { color: var(--accent); }
  .label-shake { color: var(--blue); }
  .label-mid   { color: var(--orange); }
  .label-eve   { color: var(--red); }
  .label-night { color: var(--purple); }
  .label-occ   { color: var(--text-dim); }
  .sdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .sdot-am { background: var(--accent); }
  .sdot-shake { background: var(--blue); }
  .sdot-mid { background: var(--orange); }
  .sdot-eve { background: var(--red); }
  .sdot-night { background: var(--purple); }
  .sdot-occ { background: var(--text-dim); }

  /* ITEM */
  .item { border-top: 1px solid #161616; padding: 10px 18px 12px; }
  .item-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .item-target { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .item-taken { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); margin-top: 1px; min-height: 14px; }
  .item-badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 2px 7px; border-radius: 20px; border: 1px solid; white-space: nowrap; flex-shrink: 0; margin-top: 2px; }
  .badge-warn { border-color: #ff6b6b44; color: #ff6b6b; background: #ff6b6b11; }
  .badge-cycle { border-color: #ffaa4744; color: var(--orange); background: #ffaa4711; }
  .badge-rx { border-color: #a78bfa44; color: var(--purple); background: #a78bfa11; }

  /* DOSE BUTTONS */
  .dose-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .dose-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    padding: 6px 12px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-mid); cursor: pointer; transition: all 0.15s;
    user-select: none;
  }
  .dose-btn:active { transform: scale(0.95); }
  .dose-btn.taken { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
  .dose-btn.half-taken { border-color: var(--orange); background: rgba(255,170,71,0.1); color: var(--orange); }

  .custom-input-wrap { display: flex; gap: 4px; align-items: center; }
  .custom-input {
    width: 64px; padding: 6px 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    text-align: center;
  }
  .custom-input:focus { outline: none; border-color: var(--accent); }
  .custom-go {
    padding: 6px 10px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-mid); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; cursor: pointer; transition: all 0.15s;
  }
  .custom-go:active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .clear-btn {
    margin-left: auto; padding: 5px 9px; border-radius: 8px;
    border: 1px solid #1e1e1e; background: transparent;
    color: #333; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; cursor: pointer; transition: all 0.15s;
  }
  .clear-btn:active { color: var(--red); border-color: var(--red); }

  /* DAILY READOUT */
  .readout {
    margin: 16px 18px;
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .readout-header {
    background: var(--surface);
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }
  .readout-section { padding: 10px 16px; border-bottom: 1px solid #161616; }
  .readout-section:last-child { border-bottom: none; }
  .readout-section-title { font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .readout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .readout-row { display: flex; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .readout-label { color: var(--text-dim); }
  .readout-val { color: var(--text); }
  .readout-val.highlight { color: var(--accent); }
  .readout-val.warn { color: var(--red); }
  .readout-val.zero { color: #333; }

  /* SECTION SUMMARY CHIPS */
  .section-progress { display: flex; gap: 6px; flex-wrap: wrap; padding: 0 18px 12px; }
  .sp-chip {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    padding: 3px 8px; border-radius: 20px;
    border: 1px solid var(--border); color: var(--text-dim);
    background: transparent;
  }
  .sp-chip.done { border-color: #47ff9133; color: var(--green); background: rgba(71,255,145,0.06); }

  /* RESET */
  .reset-btn {
    display: block; width: calc(100% - 36px); margin: 4px 18px 4px;
    padding: 12px; background: transparent;
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text-dim); font-family: 'JetBrains Mono', monospace;
    font-size: 11px; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:active { background: var(--surface); color: var(--red); border-color: var(--red); }
  .note { margin: 6px 18px 20px; font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #333; text-align: center; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>STACK</h1>
    <div class="date" id="dateDisplay"></div>
  </div>
  <div class="progress-ring">
    <svg width="52" height="52" viewBox="0 0 52 52">
      <circle class="pr-track" cx="26" cy="26" r="22"/>
      <circle class="pr-fill" id="prFill" cx="26" cy="26" r="22" stroke-dasharray="138.2" stroke-dashoffset="138.2"/>
    </svg>
    <div class="pr-count"><span id="prDone">0</span>/<span id="prTotal">0</span><small>done</small></div>
  </div>
</header>

<div id="appBody"></div>

<script>
// ─── ITEM DEFINITIONS ───────────────────────────────────────────────
// type: 'fixed' = tablet/cap (half/full dose multiplier on count)
//       'powder' = gram-based (half/full of target, or custom g)
//       'liquid' = mg-based
// target: default full dose (number)
// unit: display unit
// macros: { cal, protein, fibre } per full dose (for powders only)
// tracked: key for daily readout tracking
const ITEMS = [
  // MORNING
  { section:'morning', id:'b1_am',     name:'Betavit B1',        detail:'100mg × 1',                    badge:'withdrawal', badgeClass:'warn',  type:'fixed',  target:1,   unit:'tab',  tracked:'b1_mg', trackMult:100 },
  { section:'morning', id:'bioc',      name:'Blackmores Bio C',  detail:'× 2',                          badge:null,                             type:'fixed',  target:2,   unit:'tabs' },
  { section:'morning', id:'echinacea', name:'Echinacea + Zinc',  detail:'× 1',                          badge:null,                             type:'fixed',  target:1,   unit:'tab' },

  // PROTEIN DRINK
  { section:'protein', id:'protein',   name:'INC Protein',       detail:'target: 36g',                  badge:null,                             type:'powder', target:36,  unit:'g',    macros:{cal:143,protein:25,fibre:2}, perG:{cal:3.97,protein:0.694,fibre:0.056} },
  { section:'protein', id:'chia_p',    name:'Chia Seeds',        detail:'target: 15–25g',               badge:null,                             type:'powder', target:20,  unit:'g',    macros:{cal:80,protein:4.5,fibre:6.8}, perG:{cal:4.0,protein:0.227,fibre:0.34} },
  { section:'protein', id:'collagen',  name:'Collagen',          detail:'target: 7g',                   badge:null,                             type:'powder', target:7,   unit:'g',    macros:{cal:22,protein:1.25,fibre:1.6}, perG:{cal:3.14,protein:0.179,fibre:0.229}, tracked:'collagen_g' },
  { section:'protein', id:'gut',       name:'Gut Powder',        detail:'target: 7g',                   badge:null,                             type:'powder', target:7,   unit:'g',    macros:{cal:23,protein:0.3,fibre:4.1}, perG:{cal:3.29,protein:0.043,fibre:0.586} },
  { section:'protein', id:'alcar',     name:'Acetyl L-Carnitine',detail:'target: 3g',                   badge:null,                             type:'powder', target:3,   unit:'g',    tracked:'alcar_mg', trackMult:1000 },
  { section:'protein', id:'triand1',   name:'Triandrobol',       detail:'× 1',                          badge:'8wk/1wk', badgeClass:'cycle',    type:'fixed',  target:1,   unit:'tab' },
  { section:'protein', id:'creatine1', name:'Musashi Creatine',  detail:'× 1',                          badge:null,                             type:'fixed',  target:1,   unit:'tab',  tracked:'creatine_mg', trackMult:879 },
  { section:'protein', id:'fatmet1',   name:'Fat Metaboliser',   detail:'× 2 caps',                     badge:null,                             type:'fixed',  target:2,   unit:'caps' },

  // GREENS DRINK
  { section:'greens',  id:'greens',    name:'Greens Powder',     detail:'target: 10g',                  badge:null,                             type:'powder', target:10,  unit:'g',    macros:{cal:34,protein:3.2,fibre:1.9}, perG:{cal:3.4,protein:0.32,fibre:0.19} },
  { section:'greens',  id:'psyllium',  name:'Psyllium Husk',     detail:'target: 15g',                  badge:null,                             type:'powder', target:15,  unit:'g',    macros:{cal:32,protein:0,fibre:12}, perG:{cal:2.1,protein:0,fibre:0.8} },
  { section:'greens',  id:'matcha',    name:'Matcha Powder',     detail:'target: 2g',                   badge:null,                             type:'powder', target:2,   unit:'g',    macros:{cal:1,protein:0,fibre:0}, perG:{cal:0.5,protein:0,fibre:0} },

  // MIDDAY
  { section:'midday',  id:'b1_mid',    name:'Betavit B1',        detail:'100mg × 1',                    badge:'withdrawal', badgeClass:'warn',  type:'fixed',  target:1,   unit:'tab',  tracked:'b1_mg', trackMult:100 },
  { section:'midday',  id:'triand2',   name:'Triandrobol',       detail:'× 1',                          badge:'8wk/1wk', badgeClass:'cycle',    type:'fixed',  target:1,   unit:'tab' },
  { section:'midday',  id:'creatine2', name:'Musashi Creatine',  detail:'× 1',                          badge:null,                             type:'fixed',  target:1,   unit:'tab' },
  { section:'midday',  id:'fatmet2',   name:'Fat Metaboliser',   detail:'× 2 caps',                     badge:null,                             type:'fixed',  target:2,   unit:'caps' },

  // EVENING
  { section:'evening', id:'b1_eve',    name:'Betavit B1',        detail:'100mg × 1',                    badge:'withdrawal', badgeClass:'warn',  type:'fixed',  target:1,   unit:'tab',  tracked:'b1_mg', trackMult:100 },
  { section:'evening', id:'diazepam',  name:'Diazepam',          detail:'5–10mg — not with kava',       badge:'Rx', badgeClass:'rx',            type:'liquid', target:10,  unit:'mg',   tracked:'diaz_mg' },
  { section:'evening', id:'fatmet3',   name:'Fat Metaboliser',   detail:'× 2 caps',                     badge:null,                             type:'fixed',  target:2,   unit:'caps' },
  { section:'evening', id:'gaba',      name:'GABA Powder',       detail:'target: 2–4g',                 badge:null,                             type:'powder', target:3,   unit:'g' },

  // NIGHT
  { section:'night',   id:'calm',      name:'Swisse Calm+',      detail:'× 2 (ashwagandha/passion/reishi/mag)', badge:null,                    type:'fixed',  target:2,   unit:'tabs' },
  { section:'night',   id:'valerian',  name:'Valerian Forte',    detail:'400mg × 1',                    badge:null,                             type:'fixed',  target:1,   unit:'tab' },
  { section:'night',   id:'mag',       name:'Bio Magnesium',     detail:'301.5mg × 1',                  badge:null,                             type:'fixed',  target:1,   unit:'tab',  tracked:'mag_mg', trackMult:301.5 },
  { section:'night',   id:'quetiapine',name:'Quetiapine',        detail:'100mg × 1',                    badge:'Rx', badgeClass:'rx',            type:'fixed',  target:1,   unit:'tab' },

  // OCCASIONAL
  { section:'occ',     id:'kava',      name:'Kava',              detail:'not with diazepam',            badge:null,                             type:'powder', target:10,  unit:'g' },
  { section:'occ',     id:'dxm',       name:'DXM',               detail:'phasing out',                  badge:null,                             type:'liquid', target:30,  unit:'mg' },
];

const SECTIONS = {
  morning: { label:'Morning — Pre-Coffee',     dot:'sdot-am',    labelClass:'label-am' },
  protein: { label:'Protein Drink',            dot:'sdot-shake', labelClass:'label-shake' },
  greens:  { label:'Greens Drink',             dot:'sdot-shake', labelClass:'label-shake' },
  midday:  { label:'Midday',                   dot:'sdot-mid',   labelClass:'label-mid' },
  evening: { label:'Afternoon / Evening',      dot:'sdot-eve',   labelClass:'label-eve' },
  night:   { label:'Night — Before Bed',       dot:'sdot-night', labelClass:'label-night' },
  occ:     { label:'Occasional — Phasing Out', dot:'sdot-occ',   labelClass:'label-occ' },
};

const KEY = 'stack_v2';

function load() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function save(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

// ─── BUILD UI ───────────────────────────────────────────────────────
function buildUI() {
  const body = document.getElementById('appBody');
  let html = '';
  let currentSection = null;

  ITEMS.forEach(item => {
    if (item.section !== currentSection) {
      if (currentSection) html += '</div>';
      const sec = SECTIONS[item.section];
      html += `<div class="section">
        <div class="section-header">
          <div class="sdot ${sec.dot}"></div>
          <div class="section-label ${sec.labelClass}">${sec.label}</div>
        </div>`;
      currentSection = item.section;
    }

    let doseButtons = '';
    if (item.id === 'protein') {
      // Protein: half serve / full serve
      doseButtons = `
        <button class="dose-btn" id="half_${item.id}" onclick="logDose('${item.id}','half')">½ (18g)</button>
        <button class="dose-btn" id="full_${item.id}" onclick="logDose('${item.id}','full')">full (36g)</button>`;
    } else if (item.type === 'powder') {
      // All other powders: +0.5g / +1g / +5g / +10g additive
      doseButtons = `
        <button class="dose-btn" id="g05_${item.id}" onclick="logGrams('${item.id}',0.5)">+0.5g</button>
        <button class="dose-btn" id="g1_${item.id}" onclick="logGrams('${item.id}',1)">+1g</button>
        <button class="dose-btn" id="g5_${item.id}" onclick="logGrams('${item.id}',5)">+5g</button>
        <button class="dose-btn" id="g10_${item.id}" onclick="logGrams('${item.id}',10)">+10g</button>`;
    } else {
      // Fixed items: half / full
      const halfLabel = item.type === 'liquid' ? `½ (${item.target/2}${item.unit})` : `½ dose`;
      const fullLabel = item.type === 'liquid' ? `${item.target}${item.unit}` : `full`;
      doseButtons = `
        <button class="dose-btn" id="half_${item.id}" onclick="logDose('${item.id}','half')">${halfLabel}</button>
        <button class="dose-btn" id="full_${item.id}" onclick="logDose('${item.id}','full')">${fullLabel}</button>`;
    }

    html += `<div class="item" id="item_${item.id}">
      <div class="item-top">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-target">${item.detail}</div>
          <div class="item-taken" id="taken_${item.id}"></div>
        </div>
        ${item.badge ? `<div class="item-badge badge-${item.badgeClass}">${item.badge}</div>` : ''}
      </div>
      <div class="dose-row">
        ${doseButtons}
        <div class="custom-input-wrap">
          <input class="custom-input" id="custom_${item.id}" type="number" placeholder="?" step="0.5" min="0">
          <button class="custom-go" onclick="logCustom('${item.id}')">log</button>
        </div>
        <button class="clear-btn" onclick="clearItem('${item.id}')">✕</button>
      </div>
    </div>`;
  });

  if (currentSection) html += '</div>';

  // Daily Readout
  html += `<div class="readout">
    <div class="readout-header">Daily Readout</div>
    <div class="readout-section">
      <div class="readout-section-title">Macros from powders</div>
      <div id="ro_macros"></div>
    </div>
    <div class="readout-section">
      <div class="readout-section-title">Key compounds</div>
      <div id="ro_compounds"></div>
    </div>
    <div class="readout-section">
      <div class="readout-section-title">Section progress</div>
      <div class="readout-grid" id="ro_sections"></div>
    </div>
  </div>`;

  html += `<button class="reset-btn" id="resetBtn" data-confirming="false" onclick="resetAll()">↺ reset for new day</button>
  <div class="note" id="lastReset"></div><div style="height:30px"></div>`;

  body.innerHTML = html;
}

// ─── DOSE LOGGING ───────────────────────────────────────────────────
function logGrams(id, grams) {
  const state = load();
  state[id] = (state[id] || 0) + grams;
  save(state);
  render();
}

function logDose(id, type) {
  const item = ITEMS.find(i => i.id === id);
  const state = load();
  const half = item.target / 2;
  const full = item.target;
  const current = state[id] || 0;

  let newVal;
  if (type === 'half') newVal = current + half;
  else newVal = current + full;

  state[id] = newVal;
  save(state);
  render();
}

function logCustom(id) {
  const input = document.getElementById('custom_' + id);
  const val = parseFloat(input.value);
  if (isNaN(val) || val <= 0) return;
  const state = load();
  state[id] = (state[id] || 0) + val;
  save(state);
  input.value = '';
  render();
}

function clearItem(id) {
  const state = load();
  delete state[id];
  save(state);
  render();
}

// ─── RENDER ─────────────────────────────────────────────────────────
function render() {
  const state = load();
  let doneCount = 0;
  const total = ITEMS.length;

  // Accumulators
  let macros = { cal: 0, protein: 0, fibre: 0 };
  let compounds = { b1_mg: 0, alcar_mg: 0, creatine_mg: 0, mag_mg: 0, diaz_mg: 0 };

  ITEMS.forEach(item => {
    const taken = state[item.id] || 0;
    const takenEl = document.getElementById('taken_' + item.id);
    const halfBtn = document.getElementById('half_' + item.id);
    const fullBtn = document.getElementById('full_' + item.id);
    const itemEl = document.getElementById('item_' + item.id);

    if (taken > 0) {
      doneCount++;
      const unit = item.unit;
      takenEl.textContent = `✓ taken: ${taken}${unit}`;

      // Style buttons (only for fixed/liquid items that have half/full buttons)
      if (halfBtn && fullBtn) {
        if (taken >= item.target) {
          fullBtn.classList.add('taken');
          halfBtn.classList.remove('half-taken');
        } else {
          halfBtn.classList.add('half-taken');
          fullBtn.classList.remove('taken');
        }
      }

      // Accumulate macros from powders
      if (item.perG) {
        macros.cal += taken * item.perG.cal;
        macros.protein += taken * item.perG.protein;
        macros.fibre += taken * item.perG.fibre;
      }

      // Accumulate compounds
      if (item.tracked === 'b1_mg') compounds.b1_mg += taken * (item.trackMult || 1);
      if (item.tracked === 'alcar_mg') compounds.alcar_mg += taken * 1000;
      if (item.tracked === 'creatine_mg') compounds.creatine_mg += taken * 879;
      if (item.tracked === 'mag_mg') compounds.mag_mg += taken * 301.5;
      if (item.tracked === 'diaz_mg') compounds.diaz_mg += taken;

    } else {
      takenEl.textContent = '';
      if (halfBtn) halfBtn.classList.remove('half-taken');
      if (fullBtn) fullBtn.classList.remove('taken');
    }
  });

  // Progress ring
  const circ = 138.2;
  document.getElementById('prFill').style.strokeDashoffset = circ - (doneCount / total) * circ;
  document.getElementById('prDone').textContent = doneCount;
  document.getElementById('prTotal').textContent = total;

  // Macros readout
  document.getElementById('ro_macros').innerHTML = `
    <div class="readout-row"><span class="readout-label">Calories</span><span class="readout-val ${macros.cal > 0 ? 'highlight' : 'zero'}">${Math.round(macros.cal)} cal</span></div>
    <div class="readout-row"><span class="readout-label">Protein</span><span class="readout-val ${macros.protein > 0 ? 'highlight' : 'zero'}">${macros.protein.toFixed(1)}g</span></div>
    <div class="readout-row"><span class="readout-label">Fibre</span><span class="readout-val ${macros.fibre > 0 ? 'highlight' : 'zero'}">${macros.fibre.toFixed(1)}g</span></div>
  `;

  // Compounds readout
  document.getElementById('ro_compounds').innerHTML = `
    <div class="readout-row"><span class="readout-label">B1 (Thiamine)</span><span class="readout-val ${compounds.b1_mg > 0 ? 'highlight' : 'zero'}">${Math.round(compounds.b1_mg)}mg</span></div>
    <div class="readout-row"><span class="readout-label">Acetyl L-Carnitine</span><span class="readout-val ${compounds.alcar_mg > 0 ? 'highlight' : 'zero'}">${Math.round(compounds.alcar_mg)}mg</span></div>
    <div class="readout-row"><span class="readout-label">Creatine</span><span class="readout-val ${compounds.creatine_mg > 0 ? 'highlight' : 'zero'}">${Math.round(compounds.creatine_mg)}mg</span></div>
    <div class="readout-row"><span class="readout-label">Magnesium</span><span class="readout-val ${compounds.mag_mg > 0 ? 'highlight' : 'zero'}">${Math.round(compounds.mag_mg)}mg</span></div>
    <div class="readout-row"><span class="readout-label">Diazepam</span><span class="readout-val ${compounds.diaz_mg > 0 ? 'warn' : 'zero'}">${compounds.diaz_mg}mg</span></div>
  `;

  // Section progress
  const sectionMap = {};
  ITEMS.forEach(item => {
    if (!sectionMap[item.section]) sectionMap[item.section] = { done: 0, total: 0 };
    sectionMap[item.section].total++;
    if ((state[item.id] || 0) > 0) sectionMap[item.section].done++;
  });

  document.getElementById('ro_sections').innerHTML = Object.entries(sectionMap).map(([key, val]) => {
    const allDone = val.done === val.total;
    return `<div class="readout-row"><span class="readout-label">${SECTIONS[key].label.split('—')[0].trim()}</span><span class="readout-val ${allDone ? 'highlight' : ''}">${val.done}/${val.total}</span></div>`;
  }).join('');
}

function resetAll() {
  const btn = document.getElementById('resetBtn');
  if (btn.dataset.confirming === 'true') {
    const now = new Date().toLocaleString('en-AU', { hour:'2-digit', minute:'2-digit', day:'numeric', month:'short' });
    localStorage.setItem('last_reset', now);
    save({});
    render();
    document.getElementById('lastReset').textContent = `last reset ${now}`;
    btn.textContent = '↺ reset for new day';
    btn.dataset.confirming = 'false';
    btn.style.color = '';
    btn.style.borderColor = '';
  } else {
    btn.dataset.confirming = 'true';
    btn.textContent = 'tap again to confirm reset';
    btn.style.color = 'var(--red)';
    btn.style.borderColor = 'var(--red)';
    setTimeout(() => {
      btn.dataset.confirming = 'false';
      btn.textContent = '↺ reset for new day';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 3000);
  }
}

function updateDate() {
  const now = new Date();
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('dateDisplay').textContent = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
}

// ─── INIT ────────────────────────────────────────────────────────────
buildUI();
updateDate();
render();
const lr = localStorage.getItem('last_reset');
if (lr) document.getElementById('lastReset').textContent = `last reset ${lr}`;
</script>
</body>
